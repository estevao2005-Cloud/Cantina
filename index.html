<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantina do Danilson - Vendas</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="tela-venda">
        <div class="header-loja">
            <h1>🍔 Cantina do Danilson</h1>
            <p>Sistema de Vendas</p>
            <small style="display: block; margin-top: 5px;">🔄 Sincronizado com a nuvem</small>
        </div>

        <div class="info-dia">
            <div class="data-atual" id="dataAtual"></div>
            <div class="vendas-dia">Vendas hoje: <strong id="vendasHojeValor">R$ 0,00</strong></div>
        </div>

        <div class="status-online" style="background: #28a745; color: white; padding: 5px 10px; border-radius: 5px; text-align: center; margin-bottom: 10px; font-size: 12px;">
            ✅ Conectado à nuvem - Dados sincronizados em tempo real
        </div>

        <div class="filtro-categoria" id="filtroCategoria"></div>

        <div class="produtos-grid" id="produtosGrid">
            <p class="sem-produtos">⚠️ Carregando produtos...</p>
        </div>

        <div class="carrinho-area">
            <h3>🛒 Carrinho de Compras</h3>
            <div id="carrinhoLista"></div>
            <div class="total-venda" id="totalVenda">Total: R$ 0,00</div>
            <button class="btn-limpar" onclick="limparCarrinho()">🗑️ Limpar Carrinho</button>
            <button class="btn-finalizar" onclick="finalizarVenda()">✅ Finalizar Venda</button>
        </div>
    </div>

    <a href="admin/index.html" class="admin-link">🔒 Painel Admin</a>

    <script src="firebase-config.js"></script>
    <script>
        let carrinho = [];
        let categoriaFiltro = 'todas';

        function atualizarData() {
            let data = new Date();
            document.getElementById('dataAtual').innerHTML = data.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        function atualizarVendasHoje() {
            let vendas = JSON.parse(localStorage.getItem('vendas')) || [];
            let hoje = new Date().toDateString();
            let totalHoje = 0;
            for(let i = 0; i < vendas.length; i++) {
                if(new Date(vendas[i].data).toDateString() === hoje) {
                    totalHoje += vendas[i].total;
                }
            }
            document.getElementById('vendasHojeValor').innerHTML = `R$ ${totalHoje.toFixed(2)}`;
        }

        function carregarCategoriasFirebase() {
            let categorias = JSON.parse(localStorage.getItem('categorias')) || [];
            let filtroDiv = document.getElementById('filtroCategoria');
            
            if(categorias.length === 0) {
                filtroDiv.innerHTML = '';
                return;
            }
            
            let html = '<button class="btn-categoria" onclick="filtrarPorCategoria(\'todas\')">📦 Todas</button>';
            for(let i = 0; i < categorias.length; i++) {
                html += `<button class="btn-categoria" onclick="filtrarPorCategoria('${categorias[i].nome}')">${categorias[i].nome}</button>`;
            }
            filtroDiv.innerHTML = html;
        }

        function filtrarPorCategoria(categoria) {
            categoriaFiltro = categoria;
            carregarProdutosFirebase();
            
            let botoes = document.querySelectorAll('.btn-categoria');
            for(let i = 0; i < botoes.length; i++) {
                botoes[i].style.background = '#e0e0e0';
                botoes[i].style.color = '#333';
                if(botoes[i].innerText.includes(categoria)) {
                    botoes[i].style.background = '#667eea';
                    botoes[i].style.color = 'white';
                }
            }
        }

        function carregarProdutosFirebase() {
            let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            let grid = document.getElementById('produtosGrid');
            
            if(produtos.length === 0) {
                grid.innerHTML = '<p class="sem-produtos">⚠️ Nenhum produto cadastrado. Aguarde o dono adicionar os produtos no painel admin.</p>';
                return;
            }
            
            let produtosFiltrados = produtos;
            if(categoriaFiltro !== 'todas') {
                produtosFiltrados = [];
                for(let i = 0; i < produtos.length; i++) {
                    if(produtos[i].categoria === categoriaFiltro) {
                        produtosFiltrados.push(produtos[i]);
                    }
                }
            }
            
            if(produtosFiltrados.length === 0) {
                grid.innerHTML = '<p class="sem-produtos">⚠️ Nenhum produto nesta categoria.</p>';
                return;
            }
            
            grid.innerHTML = '';
            for(let i = 0; i < produtosFiltrados.length; i++) {
                let produto = produtosFiltrados[i];
                if(produto.estoque > 0) {
                    let card = document.createElement('div');
                    card.className = 'produto-card';
                    card.onclick = (function(p) { 
                        return function() { adicionarAoCarrinho(p.id); };
                    })(produto);
                    card.innerHTML = `
                        <div class="produto-nome">${produto.nome}</div>
                        <div class="produto-preco">R$ ${produto.preco.toFixed(2)}</div>
                        <div class="produto-estoque">📦 Estoque: ${produto.estoque}</div>
                        <div class="produto-categoria">🏷️ ${produto.categoria || 'Geral'}</div>
                    `;
                    grid.appendChild(card);
                }
            }
        }

        function adicionarAoCarrinho(produtoId) {
            let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            let produto = null;
            let produtoIndex = -1;
            
            for(let i = 0; i < produtos.length; i++) {
                if(produtos[i].id === produtoId) {
                    produto = produtos[i];
                    produtoIndex = i;
                    break;
                }
            }
            
            if(!produto || produto.estoque <= 0) {
                alert('⚠️ Produto sem estoque!');
                return;
            }
            
            carrinho.push({
                id: produtoIndex,
                produtoId: produto.id,
                nome: produto.nome,
                preco: produto.preco
            });
            
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            let lista = document.getElementById('carrinhoLista');
            let total = 0;
            
            if(carrinho.length === 0) {
                lista.innerHTML = '<p class="carrinho-vazio">🛒 Carrinho vazio</p>';
                document.getElementById('totalVenda').innerHTML = 'Total: R$ 0,00';
                return;
            }
            
            lista.innerHTML = '';
            for(let i = 0; i < carrinho.length; i++) {
                total += carrinho[i].preco;
                let div = document.createElement('div');
                div.className = 'carrinho-item';
                div.innerHTML = `
                    <span><strong>${carrinho[i].nome}</strong> - R$ ${carrinho[i].preco.toFixed(2)}</span>
                    <button class="btn-remover" onclick="removerDoCarrinho(${i})">❌</button>
                `;
                lista.appendChild(div);
            }
            
            document.getElementById('totalVenda').innerHTML = `Total: R$ ${total.toFixed(2)}`;
        }

        function removerDoCarrinho(index) {
            carrinho.splice(index, 1);
            atualizarCarrinho();
        }

        function limparCarrinho() {
            if(carrinho.length > 0 && confirm('Limpar carrinho?')) {
                carrinho = [];
                atualizarCarrinho();
            }
        }

        function finalizarVenda() {
            if(carrinho.length === 0) {
                alert('⚠️ Carrinho vazio! Adicione produtos.');
                return;
            }
            
            let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            let total = 0;
            let itensVendidos = [];
            
            for(let i = 0; i < carrinho.length; i++) {
                total += carrinho[i].preco;
                itensVendidos.push({ nome: carrinho[i].nome, preco: carrinho[i].preco });
                produtos[carrinho[i].id].estoque -= 1;
            }
            
            let vendaRegistro = {
                id: Date.now(),
                data: new Date().toISOString(),
                itens: itensVendidos,
                total: total
            };
            
            // Salvar no Firebase
            if(typeof salvarVendaFirebase === 'function') {
                salvarVendaFirebase(vendaRegistro);
                salvarProdutosFirebase(produtos);
                alert(`✅ Venda finalizada!\n💰 Total: R$ ${total.toFixed(2)}\n🔄 Sincronizando com a nuvem...`);
            } else {
                alert(`✅ Venda finalizada!\n💰 Total: R$ ${total.toFixed(2)}`);
            }
            
            carrinho = [];
            atualizarCarrinho();
        }
        
        // Sobrescrever funções do firebase-config para atualizar a tela
        window.carregarProdutos = carregarProdutosFirebase;
        window.atualizarVendasHoje = atualizarVendasHoje;
        window.carregarCategorias = carregarCategoriasFirebase;
        
        atualizarData();
        carregarCategoriasFirebase();
        carregarProdutosFirebase();
        atualizarVendasHoje();
        
        // Atualizar a cada 2 segundos
        setInterval(() => {
            carregarProdutosFirebase();
            atualizarVendasHoje();
        }, 2000);
    </script>
</body>
</html>
