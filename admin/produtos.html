<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Admin Cantina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <h2>🍔 Cantina</h2>
            <h3>Painel Admin - Danilson</h3>
            <nav>
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="produtos.html">📦 Produtos</a>
                <a href="categorias.html">🏷️ Categorias</a>
                <a href="despesas.html">💰 Despesas</a>
                <a href="relatorios.html">📈 Relatórios</a>
                <a href="#" onclick="logout()">🚪 Sair</a>
            </nav>
        </div>
        
        <div class="main-content">
            <h1>📦 Gerenciar Produtos</h1>
            <p>Adicione todos os produtos que você vende na cantina.</p>
            
            <div class="form-produto">
                <h3>➕ Adicionar Produto</h3>
                <form id="formProduto">
                    <input type="text" id="nome" placeholder="Nome do produto" required>
                    <input type="number" step="0.01" id="preco" placeholder="Preço R$" required>
                    <input type="number" id="estoque" placeholder="Estoque inicial" required>
                    <select id="categoria" required>
                        <option value="">Selecione a categoria</option>
                    </select>
                    <button type="submit">Adicionar Produto</button>
                </form>
            </div>
            
            <div class="lista-produtos">
                <h3>📋 Lista de Produtos</h3>
                <input type="text" id="buscaProduto" placeholder="🔍 Buscar produto..." style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ddd; border-radius:5px;">
                <div id="listaProdutos"></div>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('admin_logado');
            window.location.href = 'index.html';
        }
        
        if(localStorage.getItem('admin_logado') !== 'true') {
            window.location.href = 'index.html';
        }
        
        function carregarCategoriasNoSelect() {
            let categorias = JSON.parse(localStorage.getItem('categorias')) || [];
            let select = document.getElementById('categoria');
            
            if(categorias.length === 0) {
                select.innerHTML = '<option value="">⚠️ Nenhuma categoria - Crie uma em Categorias</option>';
                return;
            }
            
            select.innerHTML = '<option value="">Selecione a categoria</option>';
            categorias.forEach(cat => {
                select.innerHTML += `<option value="${cat.nome}">${cat.nome}</option>`;
            });
        }
        
        function carregarProdutos() {
            let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            let busca = document.getElementById('buscaProduto').value.toLowerCase();
            let div = document.getElementById('listaProdutos');
            
            let produtosFiltrados = produtos.filter(p => p.nome.toLowerCase().includes(busca));
            
            if(produtosFiltrados.length === 0) {
                div.innerHTML = '<div class="vazio">📦 Nenhum produto cadastrado. Adicione seu primeiro produto acima!</div>';
                return;
            }
            
            let html = '<table class="tabela-admin"><thead><tr><th>Produto</th><th>Categoria</th><th>Preço</th><th>Estoque</th><th>Ações</th></tr></thead><tbody>';
            
            produtosFiltrados.forEach(produto => {
                html += `<tr>
                            <td><strong>${produto.nome}</strong></td>
                            <td>🏷️ ${produto.categoria || 'Geral'}</td>
                            <td>R$ ${produto.preco.toFixed(2)}</td>
                            <td class="${produto.estoque <= 5 ? 'estoque-baixo' : ''}">${produto.estoque} unidades</td>
                            <td>
                                <button onclick="editarProduto(${produto.id})">✏️ Editar</button>
                                <button onclick="excluirProduto(${produto.id})">🗑️ Excluir</button>
                            </td>
                          </tr>`;
            });
            
            html += '</tbody></table>';
            div.innerHTML = html;
        }
        
        document.getElementById('formProduto').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let produtos = JSON.parse(localStorage.getItem('produtos')) || [];
            let categoria = document.getElementById('categoria').value;
            
            if(!categoria) {
                alert('⚠️ Crie uma categoria primeiro em "Categorias"!');
                return;
            }
            
            let novoId = Date.now();
            
            produtos.push({
                id: novoId,
                nome: document.getElementById('nome').value,
                preco: parseFloat(document.getElementById('preco').value),
                estoque: parseInt(document.getElementById('estoque').value),
                categoria: categoria
            });
            
            localStorage.setItem('produtos', JSON.stringify(produtos));
            this.reset();
            carregarProdutos();
            alert('✅ Produto adicionado com sucesso!');
        });
        
        function excluirProduto(id) {
            if(confirm('Tem certeza que deseja excluir este produto?')) {
                let produtos = JSON.parse(localStorage.getItem('produtos'));
                produtos = produtos.filter(p => p.id !== id);
                localStorage.setItem('produtos', JSON.stringify(produtos));
                carregarProdutos();
                alert('✅ Produto excluído!');
            }
        }
        
        function editarProduto(id) {
            let produtos = JSON.parse(localStorage.getItem('produtos'));
            let produto = produtos.find(p => p.id === id);
            
            let novoNome = prompt('✏️ Editar nome:', produto.nome);
            let novoPreco = prompt('💰 Editar preço (R$):', produto.preco);
            let novoEstoque = prompt('📦 Editar estoque:', produto.estoque);
            
            if(novoNome && novoNome.trim() !== '') produto.nome = novoNome;
            if(novoPreco && !isNaN(novoPreco)) produto.preco = parseFloat(novoPreco);
            if(novoEstoque && !isNaN(novoEstoque)) produto.estoque = parseInt(novoEstoque);
            
            localStorage.setItem('produtos', JSON.stringify(produtos));
            carregarProdutos();
            alert('✅ Produto atualizado!');
        }
        
        document.getElementById('buscaProduto').addEventListener('keyup', carregarProdutos);
        
        carregarCategoriasNoSelect();
        carregarProdutos();
    </script>
</body>
</html>
